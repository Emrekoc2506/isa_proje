name: Deploy Test Frontend

on:
  push:
    branches:
      - Develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Paketleri yükle
        run: npm ci

      - name: Lint kontrolü
        run: npm run lint

      - name: Testleri çalıştır
        run: npm run test:ci

      - name: Test frontend build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://api-test.ozeldersvip.xyz/api
          VITE_SIGNALR_BASE_URL: http://api-test.ozeldersvip.xyz/hubs

      - name: Natro test klasörüne yükle
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_TEST_DIR }}
